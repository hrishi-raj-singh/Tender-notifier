name: Daily Tender Scraper

on:
  schedule:
    - cron: "0 6 * * *"  # runs every day at 06:00 UTC
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write Google SA JSON to file
        run: |
          echo "${{ secrets.GOOGLE_SA_JSON }}" > gcloud-service-account.json

      - name: Run scraper
        run: |
          python tender_to_sheets.py

